<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Add</title>
    <style>
      :root {
        color-scheme: dark;
        --shell: rgba(30, 30, 30, 0.65);
        --shell-border: rgba(255, 255, 255, 0.15);
        --shell-highlight: rgba(255, 255, 255, 0.1);
        --text: rgba(255, 255, 255, 0.95);
        --muted: rgba(255, 255, 255, 0.4);
        --muted-strong: rgba(255, 255, 255, 0.6);
        --badge-bg: rgba(255, 255, 255, 0.1);
        --accent: #0A84FF;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: transparent; /* Allow native vibrancy to show through */
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        user-select: none;
        overflow: hidden;
        border-radius: 20px;
        -webkit-app-region: drag;
      }

      .shell {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0;
        height: 64px;
        padding: 0 16px;
        border-radius: 20px;
        border: 0.5px solid var(--shell-border);
        background: var(--shell);
        backdrop-filter: blur(40px) saturate(200%);
        -webkit-backdrop-filter: blur(40px) saturate(200%);
        box-shadow:
          inset 0 1px 0 var(--shell-highlight),
          0 12px 32px rgba(0, 0, 0, 0.4);
      }

      .icon {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: var(--badge-bg);
        color: var(--text);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .content {
        min-width: 0;
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .input-wrap {
        min-width: 0;
        flex: 1;
        -webkit-app-region: no-drag;
      }

      .input {
        width: 100%;
        border: 0;
        background: transparent;
        color: var(--text);
        padding: 0;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 520;
        letter-spacing: -0.02em;
        outline: none;
        caret-color: #ffffff;
      }

      .input::placeholder {
        color: var(--muted);
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
        -webkit-app-region: no-drag;
      }

      .divider {
        width: 1px;
        height: 14px;
        background: rgba(255, 255, 255, 0.08);
      }

      .meta-target {
        color: var(--muted-strong);
      }

      .meta-keys {
        color: var(--muted);
      }

      .meta-keys strong {
        color: var(--text);
        font-weight: 560;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="icon" aria-hidden="true">+</div>
      <div class="content">
        <div class="input-wrap">
          <input
            id="quickAddInput"
            class="input"
            type="text"
            placeholder="输入待办"
            autocomplete="off"
          />
        </div>
        <div class="meta">
          <span class="meta-target">📥Inbox / 今天</span>
          <span class="divider"></span>
          <span class="meta-keys"><strong>Enter</strong> 保存</span>
          <span class="meta-keys"><strong>Esc</strong> 关闭</span>
        </div>
      </div>
    </div>

    <script>
      const input = document.getElementById('quickAddInput');

      const resetInput = () => {
        input.value = '';
      };

      const focusInput = () => {
        input.focus();
        const valueLength = input.value.length;
        input.setSelectionRange(valueLength, valueLength);
      };

      const isImeComposing = (event) => event.isComposing === true || event.keyCode === 229;

      window.quickAddBridge.onReset(() => {
        resetInput();
        focusInput();
      });

      window.quickAddBridge.onFocusInput(() => {
        focusInput();
      });

      window.addEventListener('DOMContentLoaded', () => {
        resetInput();
        focusInput();
      });

      window.addEventListener('focus', () => {
        focusInput();
      });

      input.addEventListener('keydown', async (event) => {
        if (event.key === 'Escape') {
          window.quickAddBridge.close();
          return;
        }

        if (event.key === 'Enter' && !isImeComposing(event)) {
          const text = input.value.trim();
          if (!text) return;
          await window.quickAddBridge.submit(text);
          resetInput();
          focusInput();
        }
      });
    </script>
  </body>
  </html>
